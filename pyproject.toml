[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "thug-fugu-local"
version = "0.1.0"
description = "Local LLM orchestration bridge inspired by Thug AI Fugu."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "Thug-Fugu contributors" }
]
dependencies = []

[project.scripts]
fugu-local = "fugu_local.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
